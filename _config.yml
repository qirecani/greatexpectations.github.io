title: "Great Expectations"
description: "Solving interesting problems and sharing all the moments."
theme: minima

markdown: kramdown
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

plugins:
  - jekyll-feed

header_pages:
  - about.md

MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true
  },
  options: {
    skipHtmlTags: ['script','noscript','style','textarea','pre','code']
  }
};
